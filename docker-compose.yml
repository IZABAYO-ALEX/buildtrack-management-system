version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: buildtrack-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-buildtrack_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: ${DB_NAME:-buildtrack_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - buildtrack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-buildtrack_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: buildtrack-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - buildtrack-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buildtrack-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-buildtrack_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password}
      DB_NAME: ${DB_NAME:-buildtrack_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_key}
      JWT_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - buildtrack-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buildtrack-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - buildtrack-network

volumes:
  postgres_data:

networks:
  buildtrack-network:
    driver: bridge
